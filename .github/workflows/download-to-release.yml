name: Fast Download + Chunked Release Upload

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct download URL"
        required: true
        type: string
      release_tag:
        description: "Release tag (example: v0.1)"
        required: true
        type: string
      asset_name:
        description: "Optional custom filename"
        required: false
        default: ""
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 parallel

      - name: Download (multi-connection)
        env:
          FILE_URL: ${{ inputs.file_url }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          mkdir -p work

          name="${ASSET_NAME:-}"
          if [ -z "$name" ]; then
            name=$(basename "$(echo "$FILE_URL" | cut -d'?' -f1)")
          fi

          echo "Downloading with aria2..."
          aria2c -x 16 -s 16 -k 1M -o "$name" -d work "$FILE_URL"

          ls -lh work

      - name: Split if needed (NO compression)
        run: |
          cd work

          file=$(ls)
          size=$(stat -c%s "$file")

          echo "File size: $size"

          # 1.9GB chunks
          chunk=$((1900 * 1024 * 1024))

          if [ "$size" -ge $((2 * 1024 * 1024 * 1024)) ]; then
            echo "Splitting..."
            split -b $chunk -d -a 3 "$file" "$file.part-"
            rm "$file"
          else
            echo "No split needed"
          fi

          ls -lh

      - name: Upload (parallel)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.release_tag }}
        run: |
          cd work

          files=(*)

          printf "%s\n" "${files[@]}" > filelist.txt

          echo "Uploading in parallel..."

          cat filelist.txt | parallel -j 4 \
            'gh release upload "$TAG" "{}" --repo "$GITHUB_REPOSITORY" --clobber'
