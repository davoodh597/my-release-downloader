name: Download File from URL and Add as Release Asset

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Full direct download URL of the file (http/https)'
        required: true
        type: string
      release_tag:
        description: 'Release tag (example: v0.1)'
        required: true
        type: string
      asset_name:
        description: 'Custom name for the uploaded file (optional - leave empty to keep original name)'
        required: false
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download and prepare asset(s)
        shell: bash
        env:
          FILE_URL: ${{ inputs.file_url }}
          ASSET_NAME: ${{ inputs.asset_name }}
        run: |
          set -euo pipefail

          mkdir -p release-assets

          raw_name="${ASSET_NAME:-}"
          if [ -z "$raw_name" ]; then
            raw_name="$(basename "$(printf '%s' "$FILE_URL" | cut -d'?' -f1)")"
          fi

          raw_name="$(basename -- "$raw_name")"

          if [ -z "$raw_name" ] || [ "$raw_name" = "." ] || [ "$raw_name" = "/" ]; then
            raw_name="downloaded-file"
          fi

          target="release-assets/$raw_name"

          echo "Downloading from: $FILE_URL"
          curl -L --fail --retry 3 --retry-delay 2 -o "$target" "$FILE_URL"
          ls -lh "$target"

          size_bytes="$(stat -c%s "$target")"
          echo "Downloaded size: $size_bytes bytes"

          # GitHub release assets must be under 2 GiB each.
          # For larger inputs, compress and split into ~1.9 GiB parts.
          if [ "$size_bytes" -ge $((2 * 1024 * 1024 * 1024)) ]; then
            echo "File is >= 2 GiB, compressing and splitting..."

            gzip -1 -c "$target" > "${target}.gz"

            chunk_size_bytes=$((1900 * 1024 * 1024))
            split -b "$chunk_size_bytes" -d -a 3 --additional-suffix=.gz "${target}.gz" "${target}.part-"

            rm -f "$target" "${target}.gz"

            echo "Created split assets:"
            ls -lh release-assets
          else
            echo "File is under 2 GiB, uploading as a single asset."
          fi

      - name: Upload asset(s) to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(release-assets/*)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files to upload."
            exit 1
          fi

          echo "Uploading the following file(s):"
          printf ' - %s\n' "${files[@]}"

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
