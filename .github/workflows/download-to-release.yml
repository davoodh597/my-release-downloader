name: Download File from URL and Add as Release Asset

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Full direct download URL of the file (http/https)'
        required: true
        type: string
      release_tag:
        description: 'Release tag (example: v0.1)'
        required: true
        type: string
      asset_name:
        description: 'Custom name for the uploaded file (optional - leave empty to keep original name)'
        required: false
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download the file from URL
        run: |
          echo "Downloading from: ${{ inputs.file_url }}"
          curl -L --fail -o downloaded-file "${{ inputs.file_url }}"
          ls -lh downloaded-file

      - name: Upload file as Release Asset
        uses: actions/github-script@v7
        env:
          FILE_URL: ${{ inputs.file_url }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ASSET_NAME: ${{ inputs.asset_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const filePath = 'downloaded-file';
            const fileUrl = process.env.FILE_URL;
            const releaseTag = process.env.RELEASE_TAG;
            let assetName = (process.env.ASSET_NAME || '').trim();

            if (!assetName) {
              assetName = path.basename(new URL(fileUrl).pathname);
            }

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: releaseTag,
            });

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: assetName,
              data: fs.readFileSync(filePath),
            });

            console.log(`Uploaded ${assetName} to ${release.data.tag_name}`);
