name: Pull image and save into repo

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Container image reference, e.g. ghcr.io/org/app or ghcr.io/org/app:tag"
        required: true
        type: string
      runtime:
        description: "Tool to use for pulling/saving the image"
        required: true
        type: choice
        default: docker
        options:
          - docker
          - podman

jobs:
  pull-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      IMAGE_REF_INPUT: ${{ github.event.inputs.image_ref }}
      RUNTIME: ${{ github.event.inputs.runtime }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zip
          if [ "$RUNTIME" = "podman" ]; then
            sudo apt-get install -y podman
          fi

      - name: Normalize image reference and folder name
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_REF="$IMAGE_REF_INPUT"

          if [[ "$IMAGE_REF" != *@* ]] && [[ ! "$IMAGE_REF" =~ :[^/]+$ ]]; then
            IMAGE_REF="${IMAGE_REF}:latest"
          fi

          SAFE_FOLDER="$(printf '%s' "$IMAGE_REF" \
            | sed 's/[^A-Za-z0-9._-]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')"

          if [ -z "$SAFE_FOLDER" ]; then
            SAFE_FOLDER="image"
          fi

          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "SAFE_FOLDER=$SAFE_FOLDER" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: ${{ startsWith(env.IMAGE_REF_INPUT, 'ghcr.io/') }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNTIME" = "podman" ]; then
            echo "${{ github.token }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          fi

      - name: Pull image, save, and chunk if needed
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p "images/$SAFE_FOLDER"

          tmp_tar="image.tar"
          tmp_gz="image.tar.gz"
          chunk_size=$((90 * 1024 * 1024))

          echo "Using image: $IMAGE_REF"
          echo "Saving under: images/$SAFE_FOLDER"

          if [ "$RUNTIME" = "podman" ]; then
            podman pull "$IMAGE_REF"
            podman save -o "$tmp_tar" "$IMAGE_REF"
          else
            docker pull "$IMAGE_REF"
            docker save -o "$tmp_tar" "$IMAGE_REF"
          fi

          gzip -9 "$tmp_tar"

          size="$(stat -c%s "$tmp_gz")"
          base_name="${SAFE_FOLDER}.tar.gz"
          dest_dir="images/$SAFE_FOLDER"

          if [ "$size" -le "$chunk_size" ]; then
            mv "$tmp_gz" "$dest_dir/$base_name"
            echo "Saved: $dest_dir/$base_name"
          else
            split_prefix="$dest_dir/$base_name.part"
            split -b 90m -d -a 3 "$tmp_gz" "$split_prefix"
            rm -f "$tmp_gz"

            part_num=1
            for part in "$split_prefix"*; do
              [ -f "$part" ] || continue

              zip_name="${base_name}_part$(printf '%03d' "$part_num").zip"
              zip_path="$dest_dir/$zip_name"

              zip -j -q "$zip_path" "$part"
              rm -f "$part"

              echo "Created: $zip_path"
              part_num=$((part_num + 1))
            done
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A images

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add pulled image to images folder"
          git push origin "HEAD:${GITHUB_REF_NAME}"
