name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URLs separated by " | "'
        required: true
        type: string

      output_format:
        description: 'نوع خروجی'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'

      desired_quality:
        description: 'کیفیت (ویدیو: 720p, 1080p | صدا: 192kbps, 320kbps)'
        required: false
        type: string
        default: '720p'

      max_part_mb:
        description: 'حداکثر حجم هر قسمت (MB) - 0 = خودکار ۱۸۰۰ مگابایت'
        required: false
        type: string
        default: '90'

      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  youtube-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet requests

      - name: 🔗 Get Download Links
        id: retrieve
        run: |
          python3 << 'EOF'
          import os, sys, time, re, json, requests

          raw_urls = os.environ.get('INPUT_URLS', '').strip()
          fmt = os.environ.get('INPUT_FORMAT', 'mp4')
          qual = os.environ.get('INPUT_QUALITY', '720p')

          urls = [u.strip() for u in raw_urls.split('|') if u.strip()]
          if not urls:
              print("::error::No video URLs provided")
              sys.exit(1)

          is_audio = fmt == 'mp3'
          if is_audio:
              qual = qual if qual in ('64kbps', '128kbps', '192kbps', '320kbps') else '192kbps'
          else:
              qual = qual if qual in ('720p', '1080p') else '720p'

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")

          manifest = []
          for idx, url in enumerate(urls, start=1):
              payload = {
                  "url": url,
                  "os": "linux",
                  "output": {"type": "audio" if is_audio else "video", "format": fmt}
              }
              if is_audio:
                  payload["audio"] = {"bitrate": qual}
              else:
                  payload["output"]["quality"] = qual

              resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
              resp.raise_for_status()
              data = resp.json()

              status_url = data.get('statusUrl')
              title = data.get('title', 'video')

              dl_url = None
              for _ in range(150):
                  time.sleep(2)
                  r = s.get(status_url, timeout=20)
                  r.raise_for_status()
                  status = r.json()

                  if status.get('status') == 'completed':
                      dl_url = status.get('downloadUrl')
                      break
                  if status.get('status') == 'failed':
                      print(f"::error::Server failed to prepare the video: {url}")
                      sys.exit(1)

              if not dl_url:
                  print(f"::error::Could not get download link for: {url}")
                  sys.exit(1)

              m = re.search(r'(?:v=|youtu\.be/|shorts/)([a-zA-Z0-9_-]{11})', url)
              vid = m.group(1) if m else f"item{idx:02d}"

              clean = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
              clean = re.sub(r'_+', '_', clean).strip('_')[:70] or vid
              clean = clean.lstrip('-')

              fname = f"{idx:02d}_{clean}_{vid}_{qual}.{fmt}"

              manifest.append({
                  "index": idx,
                  "source_url": url,
                  "download_url": dl_url,
                  "filename": fname,
                  "title": title
              })

          with open(".download_manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              f.write(f"count={len(manifest)}\n")
              f.write(f"format={fmt}\n")
              f.write(f"quality={qual}\n")
          EOF
        env:
          INPUT_URLS: ${{ github.event.inputs.video_url }}
          INPUT_FORMAT: ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}

      - name: 📥 Download All Files
        run: |
          python3 << 'EOF'
          import json, pathlib, sys, requests

          with open(".download_manifest.json", "r", encoding="utf-8") as f:
              manifest = json.load(f)

          out_dir = pathlib.Path("release_files")
          out_dir.mkdir(parents=True, exist_ok=True)

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0"})

          for item in manifest:
              filename = item["filename"]
              url = item["download_url"]
              path = out_dir / filename

              print(f"Downloading: {filename}")
              with s.get(url, stream=True, timeout=120) as r:
                  r.raise_for_status()
                  with open(path, "wb") as f:
                      for chunk in r.iter_content(chunk_size=1024 * 1024):
                          if chunk:
                              f.write(chunk)

              if not path.exists() or path.stat().st_size == 0:
                  print(f"::error::Downloaded file is empty: {filename}")
                  sys.exit(1)
          EOF

      - name: ✂️ Split Large Files (if needed)
        run: |
          THRESH_MB="${{ github.event.inputs.max_part_mb }}"
          if [[ "$THRESH_MB" -le 0 ]] || [[ "$THRESH_MB" -gt 1900 ]]; then
            THRESH_MB=1800
          fi

          THRESH_BYTES=$((THRESH_MB * 1024 * 1024))

          shopt -s nullglob
          for filepath in release_files/*; do
            [ -f "$filepath" ] || continue

            FILESIZE=$(stat -c%s "$filepath" 2>/dev/null || echo 0)
            if [ "$FILESIZE" -gt "$THRESH_BYTES" ]; then
              echo "🔪 Splitting $(basename "$filepath") into ${THRESH_MB}MB parts..."
              cd release_files
              base="$(basename "$filepath")"
              zip -r -s "${THRESH_MB}m" "${base%.*}.zip" "./$base"
              rm -- "$base"
              cd ..
            else
              echo "📦 No split needed for $(basename "$filepath") ($(( FILESIZE / 1024 / 1024 )) MB)"
            fi
          done

          echo "Final files:"
          ls -lh release_files/

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p downloads
          mv release_files/* downloads/ 2>/dev/null || true

          git add downloads/
          git commit -m "⬇️ YouTube batch download [skip ci]" || echo "Nothing to commit"
          git push

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('yt-{0}', github.run_number) }}
          name: ${{ format('YouTube batch - {0}', github.run_number) }}
          body: |
            **📽️ YouTube Batch Download**
            **Count:** ${{ steps.retrieve.outputs.count }}
            **Format:** ${{ steps.retrieve.outputs.format }}
            **Quality:** ${{ steps.retrieve.outputs.quality }}
            **Downloaded on:** ${{ steps.get_date.outputs.date }}
            ---
            Powered by Meli-Action ⚡
          files: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always()
        run: rm -rf release_files .download_manifest.json 2>/dev/null || true
